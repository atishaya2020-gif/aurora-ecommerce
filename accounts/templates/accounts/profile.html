{% extends "base.html" %}



{% block content %}



<section class="profile-section">



<div class="profile-card">



<img 
src="{{ user.profile.image.url }}"
class="profile-pic"
>




<h1>

{{ user.username|upper }}

</h1>



<p>

{{ user.email }}

</p>


<div class="dashboard-grid">


    <div>

        <h2>{{ orders_count }}</h2>

        <p>Orders</p>

    </div>




    <div>

        <h2>{{ wishlist_count }}</h2>

        <p>Wishlist</p>

    </div>




    <div>

        <h2>{{ total_reviews }}</h2>

        <p>Reviews</p>

    </div>




    <div>

        <h2>₹{{ total_spent }}</h2>

        <p>Total Spent</p>

    </div>



</div>



<form

method="POST"

enctype="multipart/form-data"

class="profile-form"

>



{% csrf_token %}





{{ form.as_p }}






<button type="submit">

Save Changes 💾

</button>




</form>






</div>




</section>



{% endblock %}
